<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tasbeeh Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0c1410;
  --panel:#111a15;
  --border:#1e3025;
  --gold:#c8a84b;
  --green:#2a6b43;
  --text:#ddd8c4;
  --sub:#5a7060;
  --muted:#3a4e3e;
  --white:#f5f0e8;
  --sidebar:290px;
}

html,body{height:100%;overflow:hidden;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;
  height:100dvh;
}

/* ── SIDEBAR ── */
aside{
  width:var(--sidebar);
  min-width:var(--sidebar);
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition:transform 0.3s ease;
  z-index:50;
}
.sidebar-header{
  padding:20px 18px 14px;
  border-bottom:1px solid var(--border);
}
.sidebar-title{
  font-family:'Amiri',serif;
  font-size:1.05rem;
  color:var(--gold);
  letter-spacing:0.03em;
  display:block;
  margin-bottom:10px;
}
.export-btn{
  width:100%;
  padding:7px 0;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--sub);
  font-size:0.7rem;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  letter-spacing:0.1em;
  text-transform:uppercase;
  transition:background 0.12s,color 0.12s,border-color 0.12s;
}
.export-btn:hover{background:rgba(200,168,75,0.08);border-color:var(--gold);color:var(--gold);}

.sidebar-body{overflow-y:auto;flex:1;padding:0 0 20px;}
.sidebar-body::-webkit-scrollbar{width:3px;}
.sidebar-body::-webkit-scrollbar-track{background:transparent;}
.sidebar-body::-webkit-scrollbar-thumb{background:var(--border);}

.report-section{padding:14px 18px 12px;border-bottom:1px solid var(--border);}
.report-label{font-size:0.58rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--sub);margin-bottom:8px;}
.report-big{font-family:'Amiri',serif;font-size:2rem;color:var(--white);line-height:1;}
.report-sub{font-size:0.68rem;color:var(--sub);margin-top:3px;}

.week-bars{display:flex;align-items:flex-end;gap:4px;height:48px;margin-top:10px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.bar{width:100%;background:var(--border);border-radius:3px 3px 0 0;min-height:3px;transition:height 0.4s ease;}
.bar.today-bar{background:var(--gold);}
.bar.has-data{background:var(--green);}
.bar-day{font-size:0.52rem;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;}
.bar-day.today-label{color:var(--gold);}

.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px;}
.hm-cell{aspect-ratio:1;border-radius:2px;background:var(--border);cursor:default;}
.hm-cell.lv1{background:#1e4a2e;}
.hm-cell.lv2{background:#2a6b43;}
.hm-cell.lv3{background:#3a8e5a;}
.hm-cell.lv4{background:var(--gold);}

.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-key{font-size:0.7rem;color:var(--sub);}
.stat-val{font-size:0.85rem;color:var(--white);font-weight:500;}

/* ── MAIN ── */
main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  position:relative;
  overflow:hidden;
}

.today-date{font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--sub);}

/* Name chips */
.name-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 8px;max-width:min(90vw,520px);scrollbar-width:none;}
.name-scroll::-webkit-scrollbar{display:none;}
.name-chip{
  flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--sub);font-size:0.72rem;font-family:'Inter',sans-serif;
  cursor:pointer;white-space:nowrap;transition:background 0.12s,color 0.12s,border-color 0.12s;
}
.name-chip.active{background:var(--gold);border-color:var(--gold);color:#0c1410;font-weight:600;}
.name-chip:not(.active):hover{border-color:var(--muted);color:var(--text);}

/* ── TAP AREA with bead ring ── */
.tap-wrap{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  /* size = button + ring gap + bead size */
  width:min(72vw,290px);
  aspect-ratio:1;
}

/* SVG bead ring sits absolutely behind button */
.bead-svg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:visible;
}

/* individual bead circles styled via JS class toggling */
.bead{
  fill:var(--border);
  transition:fill 0.15s ease;
}
.bead.lit{
  fill:var(--gold);
  filter:drop-shadow(0 0 3px rgba(200,168,75,0.7));
}

.tap-btn{
  position:relative;
  /* inner button is 76% of wrap size */
  width:76%;
  aspect-ratio:1;
  border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--panel);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  outline:none;
  transition:transform 0.08s,background 0.1s,border-color 0.1s;
  box-shadow:0 0 0 8px rgba(30,48,37,0.2),inset 0 2px 12px rgba(0,0,0,0.5);
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  z-index:1;
}
.tap-btn:active,.tap-btn.pressed{
  transform:scale(0.94);
  background:#182219;
  border-color:var(--gold);
}

.count-num{font-family:'Amiri',serif;font-size:clamp(2.8rem,11vw,4.5rem);color:var(--white);line-height:1;}
.session-sub{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* Controls */
.bottom-row{display:flex;gap:10px;align-items:center;}
.ctrl-btn{
  padding:8px 16px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--sub);font-size:0.7rem;font-family:'Inter',sans-serif;
  cursor:pointer;letter-spacing:0.06em;transition:background 0.12s,color 0.12s,border-color 0.12s;
}
.ctrl-btn:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.ctrl-btn.reset-style:hover{border-color:#6b3030;color:#c47a7a;}

/* complete-ring flash */
@keyframes ringFlash {
  0%,100%{opacity:1}
  50%{opacity:0.3}
}
.bead-svg.complete .bead.lit{
  animation:ringFlash 0.5s ease 2;
}

/* Toast */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--green);color:#d4f0de;
  font-size:0.7rem;letter-spacing:0.1em;
  padding:7px 16px;border-radius:20px;
  opacity:0;pointer-events:none;
  transition:opacity 0.2s,transform 0.2s;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Mobile menu */
.menu-btn{
  display:none;position:fixed;top:12px;right:12px;
  background:var(--panel);border:1px solid var(--border);
  color:var(--sub);border-radius:8px;padding:6px 10px;
  font-size:1rem;cursor:pointer;z-index:100;
}

@media(max-width:640px){
  aside{position:fixed;top:0;bottom:0;left:0;transform:translateX(-100%);}
  aside.open{transform:translateX(0);}
  .menu-btn{display:block;}
  main{width:100%;}
}
</style>
</head>
<body>

<button class="menu-btn" id="menuBtn">☰</button>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">تسبيح — Reports</span>
    <button class="export-btn" id="exportBtn">⬇ Export CSV</button>
  </div>
  <div class="sidebar-body">
    <div class="report-section">
      <div class="report-label">Today</div>
      <div class="report-big" id="rToday">0</div>
      <div class="report-sub" id="rTodayDate">—</div>
    </div>
    <div class="report-section">
      <div class="report-label">This Week</div>
      <div class="report-big" id="rWeek">0</div>
      <div class="report-sub" id="rWeekRange">—</div>
      <div class="week-bars" id="weekBars"></div>
    </div>
    <div class="report-section">
      <div class="report-label">This Month</div>
      <div class="report-big" id="rMonth">0</div>
      <div class="report-sub" id="rMonthName">—</div>
      <div class="heatmap" id="heatmap"></div>
    </div>
    <div class="report-section">
      <div class="report-label">This Year</div>
      <div class="report-big" id="rYear">0</div>
      <div class="report-sub" id="rYearName">—</div>
      <div style="margin-top:10px;" id="yearStats"></div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main>
  <div class="today-date" id="mainDate">—</div>
  <div class="name-scroll" id="nameScroll"></div>

  <!-- Tap wrap holds bead ring SVG + button -->
  <div class="tap-wrap" id="tapWrap">
    <svg class="bead-svg" id="beadSvg" viewBox="0 0 290 290"></svg>
    <div class="tap-btn" id="tapBtn" tabindex="0" role="button" aria-label="Tap to count">
      <div class="count-num" id="countDisplay">0</div>
      <div class="session-sub">tap</div>
    </div>
  </div>

  <div class="bottom-row">
    <button class="ctrl-btn" id="saveBtn">Save</button>
    <button class="ctrl-btn reset-style" id="resetBtn">Reset</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── Names ──────────────────────────────────────────
const NAMES = [
  'Ya Hussain','Ya Ali','Ya Fatema','Ya Mohammad',
  'Ya Hassan','Ya Tayab','Ya Muffadal','Ya Burhanuddin'
];

// ── Storage ────────────────────────────────────────
// { "YYYY-MM-DD": { "Ya Hussain": 450, ... } }
// Historical total per name per day — sessions accumulate additively.
const STORE_KEY = 'tasbeeh_v4';
function loadData(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY))||{}; }catch{ return {}; } }
function saveData(d){ localStorage.setItem(STORE_KEY,JSON.stringify(d)); }

// ── Date helpers ───────────────────────────────────
function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function weekStart(date){
  const d=new Date(date), day=d.getDay();
  d.setDate(d.getDate()+(day===0?-6:1-day));
  return d;
}
function fmtDate(d){ return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── State ──────────────────────────────────────────
let data        = loadData();
let today       = todayKey();
let activeName  = NAMES[0];
// session count (display, resets per session)
let sessionCount = 0;
// historical total for today's active name (grows, never resets)
let historicalToday = (data[today]?.[activeName]) || 0;

// ── DOM ────────────────────────────────────────────
const countDisplay = document.getElementById('countDisplay');
const mainDate     = document.getElementById('mainDate');
const tapBtn       = document.getElementById('tapBtn');
const saveBtn      = document.getElementById('saveBtn');
const resetBtn     = document.getElementById('resetBtn');
const toast        = document.getElementById('toast');
const menuBtn      = document.getElementById('menuBtn');
const sidebar      = document.getElementById('sidebar');
const nameScroll   = document.getElementById('nameScroll');
const exportBtn    = document.getElementById('exportBtn');
const beadSvg      = document.getElementById('beadSvg');

// ── Bead ring ──────────────────────────────────────
const BEAD_COUNT  = 100;
const SVG_SIZE    = 290;
const CENTER      = SVG_SIZE / 2;
const RING_R      = 136;   // radius of bead centres
const BEAD_R      = 4.2;   // bead circle radius

let beadEls = [];

function buildRing(){
  beadSvg.innerHTML='';
  beadEls=[];
  for(let i=0;i<BEAD_COUNT;i++){
    // start at top (-90°), go clockwise
    const angle = (i/BEAD_COUNT)*2*Math.PI - Math.PI/2;
    const cx = CENTER + RING_R * Math.cos(angle);
    const cy = CENTER + RING_R * Math.sin(angle);
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', cx.toFixed(2));
    circle.setAttribute('cy', cy.toFixed(2));
    circle.setAttribute('r',  BEAD_R);
    circle.classList.add('bead');
    beadSvg.appendChild(circle);
    beadEls.push(circle);
  }
}

function updateBeads(n){
  // n = session count (0-based position in ring)
  const lit = n % BEAD_COUNT;
  beadEls.forEach((b,i)=>{ b.classList.toggle('lit', i < lit); });
}

function flashRing(){
  beadSvg.classList.add('complete');
  setTimeout(()=>beadSvg.classList.remove('complete'), 1100);
}

// ── Haptic ─────────────────────────────────────────
function haptic(pattern){ if(navigator.vibrate) navigator.vibrate(pattern); }

// ── Name chips ─────────────────────────────────────
function buildChips(){
  nameScroll.innerHTML='';
  NAMES.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='name-chip'+(name===activeName?' active':'');
    btn.textContent=name;
    btn.addEventListener('click',()=>switchName(name));
    nameScroll.appendChild(btn);
  });
}

function switchName(name){
  commitSession(); // flush current session into storage before switching
  activeName      = name;
  sessionCount    = 0;
  historicalToday = (data[today]?.[activeName])||0;
  countDisplay.textContent = 0;
  updateBeads(0);
  buildChips();
  renderReports();
}

// ── Commit session (add session count to historical) ──
function commitSession(){
  if(sessionCount===0) return;
  if(!data[today]) data[today]={};
  data[today][activeName] = (data[today][activeName]||0) + sessionCount;
  historicalToday = data[today][activeName];
  saveData(data);
}

// ── Tap ────────────────────────────────────────────
function tap(){
  sessionCount++;
  countDisplay.textContent = sessionCount;
  updateBeads(sessionCount);

  // haptic: stronger pulse every 10, normal otherwise
  if(sessionCount % 100 === 0){
    haptic([30,20,30,20,60]);
    flashRing();
    // auto-commit on each complete 100
    commitSession();
    sessionCount=0;
    historicalToday = (data[today]?.[activeName])||0;
    countDisplay.textContent=0;
    updateBeads(0);
    renderReports();
  } else if(sessionCount % 10 === 0){
    haptic([0,0,18]);
  } else {
    haptic(10);
  }
}

tapBtn.addEventListener('click', tap);
tapBtn.addEventListener('keydown', e=>{ if(e.key===' '||e.key==='Enter') tap(); });
tapBtn.addEventListener('pointerdown', ()=>tapBtn.classList.add('pressed'));
tapBtn.addEventListener('pointerup',   ()=>tapBtn.classList.remove('pressed'));
tapBtn.addEventListener('pointerleave',()=>tapBtn.classList.remove('pressed'));

// ── Save ───────────────────────────────────────────
saveBtn.addEventListener('click',()=>{
  commitSession();
  renderReports();
  flashToast('Saved ✓');
});

// ── Reset ──────────────────────────────────────────
// Commits current session to history, then zeroes session display.
// Historical total is PRESERVED — you can see it in the sidebar.
resetBtn.addEventListener('click',()=>{
  commitSession();       // flush session → history
  sessionCount = 0;      // reset display counter
  countDisplay.textContent = 0;
  updateBeads(0);
  renderReports();
  haptic([15,10,15]);
  flashToast('Session reset · total saved');
});

// ── Toast ──────────────────────────────────────────
function flashToast(msg){
  toast.textContent=msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>toast.classList.remove('show'),1800);
}

// ── Export ─────────────────────────────────────────
exportBtn.addEventListener('click',()=>{
  commitSession();
  const allDates=Object.keys(data).sort();
  if(!allDates.length){ flashToast('No data yet'); return; }
  const header=['Date',...NAMES,'Total'];
  const rows=[header.join(',')];
  allDates.forEach(dk=>{
    const vals=NAMES.map(n=>(data[dk]?.[n])||0);
    const total=vals.reduce((a,b)=>a+b,0);
    rows.push([dk,...vals,total].join(','));
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`tasbeeh_${todayKey()}.csv`; a.click();
  URL.revokeObjectURL(url);
  flashToast('Exported ✓');
});

// ── Mobile sidebar ─────────────────────────────────
menuBtn.addEventListener('click',()=>sidebar.classList.toggle('open'));
document.addEventListener('click',e=>{
  if(sidebar.classList.contains('open')&&!sidebar.contains(e.target)&&e.target!==menuBtn)
    sidebar.classList.remove('open');
});

// ── Reports ────────────────────────────────────────
function nameTotal(dateKey, name){
  return (data[dateKey]?.[name])||0;
}

function renderReports(){
  const now=new Date();
  const tk=todayKey();
  // Reports use committed historical data (do not inject live session here)

  // TODAY — show historical committed total
  const tv = nameTotal(tk, activeName);
  document.getElementById('rToday').textContent = tv.toLocaleString();
  document.getElementById('rTodayDate').textContent = activeName+' · '+fmtDate(now);
  mainDate.textContent = fmtDate(now).toUpperCase();

  // WEEK
  const ws=weekStart(now);
  let weekTotal=0;
  const weekDays=[];
  for(let i=0;i<7;i++){
    const dd=new Date(ws); dd.setDate(ws.getDate()+i);
    const k=`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
    const v=nameTotal(k,activeName);
    weekTotal+=v;
    weekDays.push({label:DAY_NAMES[i],val:v,isToday:k===tk});
  }
  document.getElementById('rWeek').textContent=weekTotal.toLocaleString();
  const weEnd=new Date(ws); weEnd.setDate(ws.getDate()+6);
  document.getElementById('rWeekRange').textContent=
    ws.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+
    weEnd.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const barsEl=document.getElementById('weekBars');
  barsEl.innerHTML='';
  const maxW=Math.max(...weekDays.map(x=>x.val),1);
  weekDays.forEach(({label,val,isToday})=>{
    const pct=Math.max(val/maxW*100,val>0?8:4);
    const col=document.createElement('div');
    col.className='bar-col';
    col.innerHTML=`<div class="bar${isToday?' today-bar':val>0?' has-data':''}" style="height:${pct}%"></div>
      <div class="bar-day${isToday?' today-label':''}">${label}</div>`;
    barsEl.appendChild(col);
  });

  // MONTH
  const y=now.getFullYear(),m=now.getMonth()+1;
  const daysInMonth=new Date(y,m,0).getDate();
  let monthTotal=0; const monthVals=[];
  for(let dd=1;dd<=daysInMonth;dd++){
    const k=`${y}-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const v=nameTotal(k,activeName);
    monthTotal+=v; monthVals.push(v);
  }
  document.getElementById('rMonth').textContent=monthTotal.toLocaleString();
  document.getElementById('rMonthName').textContent=MONTH_NAMES[m-1]+' '+y;
  const hmEl=document.getElementById('heatmap');
  hmEl.innerHTML='';
  const maxM=Math.max(...monthVals,1);
  const firstDay=new Date(y,m-1,1).getDay();
  const padStart=firstDay===0?6:firstDay-1;
  for(let p=0;p<padStart;p++){const c=document.createElement('div');c.className='hm-cell';hmEl.appendChild(c);}
  monthVals.forEach((v,i)=>{
    const c=document.createElement('div');
    const lv=v===0?'':v<maxM*0.25?'lv1':v<maxM*0.5?'lv2':v<maxM*0.75?'lv3':'lv4';
    c.className='hm-cell'+(lv?' '+lv:'');
    c.title=`${String(i+1).padStart(2,'0')} ${MONTH_NAMES[m-1]}: ${v.toLocaleString()}`;
    hmEl.appendChild(c);
  });

  // YEAR
  let yearTotal=0,bestDay=0,bestDayKey='',streak=0,curStreak=0;
  const allKeys=Object.keys(data).filter(k=>k.startsWith(y+'-')).sort();
  allKeys.forEach(k=>{
    const v=nameTotal(k,activeName);
    yearTotal+=v;
    if(v>bestDay){bestDay=v;bestDayKey=k;}
    if(v>0){curStreak++;streak=Math.max(streak,curStreak);}else{curStreak=0;}
  });
  const activeDays=allKeys.filter(k=>nameTotal(k,activeName)>0).length;
  document.getElementById('rYear').textContent=yearTotal.toLocaleString();
  document.getElementById('rYearName').textContent=y;
  const avg=activeDays>0?Math.round(yearTotal/activeDays):0;
  let bdLabel='—';
  if(bestDayKey){
    const pts=bestDayKey.split('-').map(Number);
    bdLabel=`${pts[2]} ${MONTH_NAMES[pts[1]-1]} (${bestDay.toLocaleString()})`;
  }
  document.getElementById('yearStats').innerHTML=`
    <div class="stat-row"><span class="stat-key">Active days</span><span class="stat-val">${activeDays}</span></div>
    <div class="stat-row"><span class="stat-key">Daily avg</span><span class="stat-val">${avg.toLocaleString()}</span></div>
    <div class="stat-row"><span class="stat-key">Best day</span><span class="stat-val">${bdLabel}</span></div>
    <div class="stat-row"><span class="stat-key">Best streak</span><span class="stat-val">${streak} day${streak!==1?'s':''}</span></div>
  `;
}

// ── Auto-save on hide ───────────────────────────────
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden') commitSession();
});

// ── Midnight rollover ──────────────────────────────
function checkDay(){
  const newToday=todayKey();
  if(newToday!==today){
    commitSession();
    today=newToday;
    sessionCount=0;
    historicalToday=(data[today]?.[activeName])||0;
    countDisplay.textContent=0;
    updateBeads(0);
    renderReports();
  }
}
setInterval(checkDay,30000);

// ── Init ───────────────────────────────────────────
buildRing();
buildChips();
countDisplay.textContent=0;
renderReports();
</script>
